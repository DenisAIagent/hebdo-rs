[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && rm -rf dist node_modules/.vite && npm run build",
  "cd backend && rm -rf dist && npm run build"
]

[start]
cmd = "cd backend && NODE_ENV=production node dist/index.js"
